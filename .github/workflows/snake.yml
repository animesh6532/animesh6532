name: Generate Contribution Snake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate_snake:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: animesh6532
          outputs: |
            output/github-contribution-grid-snake.svg
            output/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage the output snake graphics
          git add output/github-contribution-grid-snake.svg output/github-contribution-grid-snake-dark.svg || true
          
          # Commit only if there are actual diff changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: update daily contribution snake grid [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "Successfully updated and pushed contribution snake grids."
          else
            echo "No changes in contribution snake. Skipping commit and push."
          fi
