name: Build & Validate Terminal SVG

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_and_validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run generation pipeline and validate SVG
        run: |
          python scripts/generate_ascii.py
          python scripts/optimize_ascii.py
          python scripts/build_svg.py
          python scripts/animate_terminal.py
          python scripts/export_svg.py
